groups:
  - name: pharma_mlops
    rules:
      - alert: ServingAPIDown
        expr: up{job="serving-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Serving API is down"
          description: "The prediction serving API has been unreachable for more than 1 minute."

      - alert: HighPredictionLatency
        expr: histogram_quantile(0.99, rate(pharma_prediction_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prediction latency p99 exceeds 2 seconds"
          description: "99th percentile prediction latency is {{ $value }}s."

      - alert: HighErrorRate
        expr: rate(pharma_requests_total{status="500"}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on serving API"
          description: "Error rate is {{ $value }} requests/sec."

      - alert: NoPredictionsReceived
        expr: rate(pharma_predictions_total[30m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No predictions in the last 30 minutes"
          description: "The serving API has not received any prediction requests."
