global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: serving-api
    static_configs:
      - targets: ["host.docker.internal:30080"]
    metrics_path: /metrics

  - job_name: mlflow
    static_configs:
      - targets: ["mlflow:5000"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
