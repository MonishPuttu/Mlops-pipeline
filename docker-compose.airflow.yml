networks:
  pharma-net:
    external: true

volumes:
  airflow-logs:

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflowpass123@postgres:5432/airflow_db
    AIRFLOW__CORE__FERNET_KEY: "YlCImzjge_TeZc7jPJ7Jeq0lLtmNpVAKtRHHtQhGRSk="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: "pharma-mlops-secret-key-local"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
    MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin123
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - .:/opt/airflow/project
  networks:
    - pharma-net

services:
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install mlflow==2.16.2 scikit-learn==1.3.2 pandas==2.1.4 numpy==1.26.2 scipy==1.11.4 joblib==1.3.2 PyYAML==6.0.1 boto3 --quiet
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Pharma \
          --lastname MLOps \
          --role Admin \
          --email admin@pharma.com || true
        echo "Airflow init complete"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "airflow",
          "jobs",
          "check",
          "--job-type",
          "SchedulerJob",
          "--hostname",
          "$${HOSTNAME}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
